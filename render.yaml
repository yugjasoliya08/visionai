services:
  # 1. Free Redis Instance for real-time collaboration
  - type: redis
    name: visionai-redis
    ipAllowList: [] # Allow all internal connections
    plan: free

  # 2. Python FastAPI Backend
  - type: web
    name: visionai-api
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        sync: false # User must provide this in the Render Dashboard!
      - key: REDIS_URL
        fromService:
          type: redis
          name: visionai-redis
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false # User must provide this in Render Dashboard!
      - key: SECRET_KEY
        generateValue: true # Render will generate a strong secret key automatically!
